<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конвертер файлов - Полная версия</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Библиотеки для конвертации -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0a0a2a 0%, #1a1a4a 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            text-align: center;
            padding: 30px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 50px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .header h1 { font-size: 2.5rem; font-weight: 700; background: linear-gradient(135deg, #fff, #a5b4fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .author-info { font-size: 1.2rem; color: #818cf8; margin-top: 10px; padding: 8px 20px; background: rgba(129,140,248,0.1); border-radius: 30px; display: inline-block; border: 1px solid rgba(129,140,248,0.3); }
        .tabs { display: flex; gap: 15px; margin-bottom: 30px; justify-content: center; flex-wrap: wrap; }
        .tab {
            padding: 15px 35px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .tab:hover { background: rgba(129,140,248,0.15); border-color: #818cf8; transform: translateY(-2px); }
        .tab.active { background: linear-gradient(135deg, #818cf8, #a78bfa); border-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        .category-card {
            background: rgba(30,30,60,0.7);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
            cursor: pointer;
        }
        .category-card:hover { transform: translateY(-8px); background: rgba(50,50,90,0.8); border-color: #818cf8; }
        .category-card.active { border: 2px solid #818cf8; background: rgba(129,140,248,0.15); }
        .category-icon { font-size: 2.5rem; color: #818cf8; margin-bottom: 15px; }
        .category-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 10px; }
        .category-formats { color: #a0aec0; font-size: 0.85rem; display: flex; flex-wrap: wrap; gap: 6px; }
        .format-tag { background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; }
        .converter-panel {
            background: rgba(20,20,50,0.9);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 35px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-top: 30px;
        }
        .upload-area {
            border: 3px dashed rgba(129,140,248,0.3);
            border-radius: 30px;
            padding: 60px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            margin-bottom: 30px;
        }
        .upload-area:hover { border-color: #818cf8; background: rgba(129,140,248,0.05); transform: scale(1.02); }
        .upload-area i { font-size: 5rem; color: #818cf8; margin-bottom: 20px; animation: float 3s infinite; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .upload-area h3 { font-size: 1.8rem; margin-bottom: 10px; }
        .file-list {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            max-height: 300px;
            overflow-y: auto;
        }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .file-info { display: flex; align-items: center; gap: 15px; }
        .file-icon { font-size: 1.5rem; color: #818cf8; }
        .file-actions button {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .file-actions button:hover { background: #ef4444; transform: scale(1.1); }
        .converter-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .control-group {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 20px;
        }
        .control-group label { color: #a0aec0; margin-bottom: 8px; display: block; font-size: 0.9rem; }
        .control-group select, .control-group input {
            width: 100%;
            padding: 12px;
            background: rgba(30,30,60,0.9);
            border: 1px solid rgba(129,140,248,0.3);
            border-radius: 12px;
            color: #fff;
            font-size: 0.95rem;
            cursor: pointer;
        }
        /* Стили для выпадающего списка - ИСПРАВЛЕНО */
        .control-group select option {
            background: #1a1a4a;
            color: #fff;
            padding: 10px;
        }
        .control-group select:focus {
            outline: none;
            border-color: #818cf8;
            box-shadow: 0 0 0 2px rgba(129,140,248,0.3);
        }
        .control-group select:hover {
            border-color: #818cf8;
        }
        .slider-container input[type="range"] {
            padding: 0;
            height: 6px;
            background: linear-gradient(90deg, #818cf8, #a78bfa);
            border-radius: 3px;
        }
        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #818cf8;
        }
        .quality-value { color: #818cf8; font-weight: 600; background: rgba(129,140,248,0.1); padding: 3px 10px; border-radius: 20px; font-size: 0.85rem; }
        .action-buttons { display: flex; gap: 15px; justify-content: flex-end; flex-wrap: wrap; }
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn-primary { background: linear-gradient(135deg, #818cf8, #a78bfa); color: #fff; box-shadow: 0 8px 20px rgba(129,140,248,0.3); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(129,140,248,0.5); }
        .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .btn-secondary:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
        .btn-success { background: linear-gradient(135deg, #10b981, #059669); color: #fff; }
        .btn-success:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(16,185,129,0.4); }
        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin: 20px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #818cf8, #a78bfa); width: 0%; transition: width 0.3s; }
        .preview-area {
            margin-top: 25px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .preview-card {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 20px;
        }
        .preview-card h4 { color: #a0aec0; margin-bottom: 15px; font-size: 0.9rem; }
        .preview-content {
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 15px;
        }
        .preview-content img, .preview-content video { max-width: 100%; max-height: 150px; border-radius: 8px; }
        .history-panel {
            background: rgba(20,20,50,0.95);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 30px;
        }
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .history-title h2 { font-size: 1.8rem; }
        .history-stats { color: #818cf8; background: rgba(129,140,248,0.1); padding: 4px 12px; border-radius: 20px; font-size: 0.9rem; }
        .history-filters { display: flex; gap: 12px; flex-wrap: wrap; }
        .history-filters select, .history-filters input {
            padding: 10px 18px;
            background: rgba(30,30,60,0.9);
            border: 1px solid rgba(129,140,248,0.3);
            border-radius: 12px;
            color: #fff;
            font-size: 0.9rem;
        }
        .history-filters select option {
            background: #1a1a4a;
            color: #fff;
        }
        .history-filters .btn-small {
            background: rgba(129,140,248,0.2);
            color: #fff;
            border: 1px solid rgba(129,140,248,0.3);
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .history-list { max-height: 500px; overflow-y: auto; }
        .history-item {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s;
        }
        .history-item:hover { background: rgba(129,140,248,0.1); border-color: #818cf8; transform: translateX(5px); }
        .history-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .history-item-date { color: #818cf8; font-size: 0.8rem; }
        .history-item-category { background: rgba(129,140,248,0.2); color: #818cf8; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; text-transform: uppercase; }
        .history-item-files {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        .history-file { display: flex; align-items: center; gap: 12px; }
        .history-file-icon { font-size: 1.3rem; color: #818cf8; }
        .history-item-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .history-item-footer button {
            padding: 6px 14px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .history-item-footer button:first-child { background: linear-gradient(135deg, #818cf8, #6366f1); color: white; }
        .history-item-footer button:last-child { background: linear-gradient(135deg, #10b981, #059669); color: white; }
        .history-empty { text-align: center; padding: 60px 20px; color: #a0aec0; }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(26,26,74,0.95);
            backdrop-filter: blur(10px);
            border-left: 4px solid #818cf8;
            padding: 12px 20px;
            border-radius: 12px;
            z-index: 1000;
            animation: slideIn 0.3s;
            font-size: 0.9rem;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .floating-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #818cf8, #a78bfa);
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 1000;
        }
        .floating-btn:hover { transform: scale(1.1); }
        @media (max-width: 768px) {
            .preview-area, .history-item-files { grid-template-columns: 1fr; }
            .btn { width: 100%; justify-content: center; }
            .upload-area h3 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 Конвертер файлов Pro</h1>
            <div class="author-info"><i class="fas fa-user"></i> Автор проекта: Максим Масло</div>
        </div>

        <div class="tabs">
            <div class="tab active" data-tab="converter"><i class="fas fa-arrows-spin"></i><span>Конвертер</span></div>
            <div class="tab" data-tab="history"><i class="fas fa-history"></i><span>История</span></div>
        </div>

        <div class="tab-content active" id="converterTab">
            <div class="categories" id="categories">
                <div class="category-card active" data-category="images">
                    <div class="category-icon"><i class="fas fa-image"></i></div>
                    <div class="category-title">Изображения</div>
                    <div class="category-formats"><span class="format-tag">JPG</span><span class="format-tag">PNG</span><span class="format-tag">WEBP</span><span class="format-tag">GIF</span><span class="format-tag">BMP</span></div>
                </div>
                <div class="category-card" data-category="documents">
                    <div class="category-icon"><i class="fas fa-file-alt"></i></div>
                    <div class="category-title">Документы</div>
                    <div class="category-formats"><span class="format-tag">TXT</span><span class="format-tag">PDF</span><span class="format-tag">DOCX</span><span class="format-tag">XLSX</span></div>
                </div>
                <div class="category-card" data-category="video">
                    <div class="category-icon"><i class="fas fa-video"></i></div>
                    <div class="category-title">Видео</div>
                    <div class="category-formats"><span class="format-tag">MP4</span><span class="format-tag">AVI</span><span class="format-tag">MOV</span><span class="format-tag">MKV</span><span class="format-tag">WEBM</span></div>
                </div>
                <div class="category-card" data-category="archives">
                    <div class="category-icon"><i class="fas fa-file-archive"></i></div>
                    <div class="category-title">Архивы</div>
                    <div class="category-formats"><span class="format-tag">ZIP</span><span class="format-tag">RAR</span></div>
                </div>
            </div>

            <div class="converter-panel">
                <div class="upload-area" id="uploadArea">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <h3>Перетащите файлы сюда</h3>
                    <p>или нажмите для выбора</p>
                    <input type="file" id="fileInput" multiple style="display: none;" accept="*/*">
                </div>
                <div class="file-list" id="fileList" style="display: none;"></div>

                <div class="converter-controls">
                    <div class="control-group">
                        <label><i class="fas fa-arrow-right"></i> Конвертировать в:</label>
                        <select id="targetFormat"></select>
                    </div>
                    <div class="control-group">
                        <label><i class="fas fa-compress"></i> Качество/Сжатие:</label>
                        <div class="slider-container">
                            <input type="range" id="compressLevel" min="0" max="100" value="0">
                            <div style="display: flex; justify-content: space-between; margin-top: 5px;">
                                <span style="font-size: 0.8rem;">Без сжатия</span>
                                <span class="quality-value" id="compressValue">0%</span>
                                <span style="font-size: 0.8rem;">Макс сжатие</span>
                            </div>
                        </div>
                    </div>
                    <div class="control-group">
                        <label><i class="fas fa-expand"></i> Размер (опционально):</label>
                        <div style="display: flex; gap: 8px;">
                            <input type="number" id="widthInput" placeholder="Ширина" min="1">
                            <input type="number" id="heightInput" placeholder="Высота" min="1">
                        </div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-secondary" id="clearBtn"><i class="fas fa-trash"></i><span>Очистить</span></button>
                    <button class="btn btn-primary" id="convertBtn" disabled><i class="fas fa-play"></i><span>Конвертировать</span></button>
                </div>

                <div class="progress-bar" id="progressBar" style="display: none;"><div class="progress-fill" id="progressFill"></div></div>

                <div class="preview-area" id="previewArea" style="display: none;">
                    <div class="preview-card"><h4><i class="fas fa-file"></i> Оригинал</h4><div class="preview-content" id="originalPreview"></div><div class="preview-info" id="originalInfo"></div></div>
                    <div class="preview-card"><h4><i class="fas fa-check-circle"></i> Результат</h4><div class="preview-content" id="resultPreview"></div><div class="preview-info" id="resultInfo"></div><button class="btn btn-success" id="downloadAllBtn" style="margin-top: 15px; width: 100%;" disabled><i class="fas fa-download"></i><span>Скачать все</span></button></div>
                </div>
            </div>
        </div>

        <div class="tab-content" id="historyTab">
            <div class="history-panel">
                <div class="history-header">
                    <div class="history-title"><h2><i class="fas fa-history"></i> История конвертаций</h2><span class="history-stats" id="historyStats">0 записей</span></div>
                    <div class="history-filters">
                        <select id="historyCategoryFilter"><option value="all">Все категории</option><option value="images">Изображения</option><option value="documents">Документы</option><option value="video">Видео</option><option value="archives">Архивы</option></select>
                        <input type="text" id="historySearch" placeholder="Поиск...">
                        <button class="btn-small" id="clearHistoryBtn"><i class="fas fa-trash"></i> Очистить</button>
                        <button class="btn-small" id="exportHistoryBtn"><i class="fas fa-download"></i> Экспорт</button>
                    </div>
                </div>
                <div class="history-list" id="historyList"></div>
            </div>
        </div>
    </div>

    <button class="floating-btn" onclick="scrollToTop()"><i class="fas fa-arrow-up"></i></button>

    <script>
        let files = [];
        let processedFiles = [];
        let currentCategory = 'images';
        let isProcessing = false;
        let conversionHistory = [];

        try {
            const saved = localStorage.getItem('conversionHistory');
            if (saved) conversionHistory = JSON.parse(saved);
        } catch(e) {}

        const formats = {
            images: { input: ['jpg','jpeg','png','gif','bmp','webp'], output: ['jpg','png','webp','gif','bmp'] },
            documents: { input: ['txt','pdf','docx','xlsx','xls'], output: ['txt','pdf','docx','csv'] },
            video: { input: ['mp4','avi','mov','mkv','webm','flv','3gp'], output: ['mp4','avi','mov','mkv','webm'] },
            archives: { input: ['zip','rar','7z'], output: ['zip'] }
        };

        const mimeTypes = {
            'jpg':'image/jpeg','jpeg':'image/jpeg','png':'image/png','gif':'image/gif','bmp':'image/bmp','webp':'image/webp',
            'txt':'text/plain','pdf':'application/pdf','docx':'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
            'csv':'text/csv','mp4':'video/mp4','avi':'video/x-msvideo','mov':'video/quicktime','mkv':'video/x-matroska','webm':'video/webm',
            'zip':'application/zip'
        };

        document.addEventListener('DOMContentLoaded', () => {
            setupEventListeners();
            updateFormatSelectors();
            updateHistoryList();
        });

        function setupEventListeners() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(tab.dataset.tab + 'Tab').classList.add('active');
                });
            });

            document.querySelectorAll('.category-card').forEach(card => {
                card.addEventListener('click', () => {
                    document.querySelectorAll('.category-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    currentCategory = card.dataset.category;
                    updateFormatSelectors();
                });
            });

            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            uploadArea.addEventListener('click', () => fileInput.click());
            uploadArea.addEventListener('dragover', (e) => e.preventDefault());
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                addFiles(Array.from(e.dataTransfer.files));
            });
            fileInput.addEventListener('change', (e) => addFiles(Array.from(e.target.files)));

            document.getElementById('compressLevel').addEventListener('input', (e) => {
                document.getElementById('compressValue').textContent = e.target.value + '%';
            });
            document.getElementById('clearBtn').addEventListener('click', () => { files = []; processedFiles = []; updateFileList(); document.getElementById('previewArea').style.display = 'none'; document.getElementById('convertBtn').disabled = true; });
            document.getElementById('convertBtn').addEventListener('click', convertFiles);
            document.getElementById('downloadAllBtn').addEventListener('click', downloadAll);
            document.getElementById('historyCategoryFilter').addEventListener('change', updateHistoryList);
            document.getElementById('historySearch').addEventListener('input', updateHistoryList);
            document.getElementById('clearHistoryBtn').addEventListener('click', clearHistory);
            document.getElementById('exportHistoryBtn').addEventListener('click', exportHistory);
        }

        function updateFormatSelectors() {
            const targetSelect = document.getElementById('targetFormat');
            targetSelect.innerHTML = '';
            formats[currentCategory].output.forEach(format => {
                const option = document.createElement('option');
                option.value = format;
                option.textContent = format.toUpperCase();
                targetSelect.appendChild(option);
            });
        }

        function addFiles(newFiles) {
            const supported = formats[currentCategory].input;
            const valid = newFiles.filter(f => supported.includes(f.name.split('.').pop().toLowerCase()));
            if (valid.length === 0) { showToast('Неподдерживаемый формат', 'error'); return; }
            files = [...files, ...valid];
            updateFileList();
            document.getElementById('convertBtn').disabled = false;
            showToast(`Добавлено ${valid.length} файлов`, 'success');
        }

        function updateFileList() {
            const list = document.getElementById('fileList');
            if (files.length === 0) { list.style.display = 'none'; return; }
            list.style.display = 'block';
            list.innerHTML = '';
            files.forEach((f, i) => {
                list.innerHTML += `
                    <div class="file-item">
                        <div class="file-info"><i class="fas ${getIcon(f.name)} file-icon"></i><div><div>${f.name}</div><div class="file-size">${(f.size/1024).toFixed(2)} KB</div></div></div>
                        <div class="file-actions"><button onclick="removeFile(${i})"><i class="fas fa-times"></i></button></div>
                    </div>
                `;
            });
        }

        function getIcon(name) {
            const ext = name.split('.').pop().toLowerCase();
            const icons = { 'jpg':'fa-image','png':'fa-image','mp4':'fa-video','avi':'fa-video','pdf':'fa-file-pdf','docx':'fa-file-word','zip':'fa-file-archive' };
            return icons[ext] || 'fa-file';
        }

        window.removeFile = (i) => { files.splice(i,1); updateFileList(); if(files.length===0) document.getElementById('convertBtn').disabled = true; };

        async function convertFiles() {
            if (isProcessing || files.length === 0) return;
            isProcessing = true;
            document.getElementById('convertBtn').disabled = true;
            document.getElementById('progressBar').style.display = 'block';
            document.getElementById('previewArea').style.display = 'none';
            processedFiles = [];
            const target = document.getElementById('targetFormat').value;
            const quality = 1 - (document.getElementById('compressLevel').value / 100 * 0.9);
            const width = document.getElementById('widthInput').value;
            const height = document.getElementById('heightInput').value;

            for (let i = 0; i < files.length; i++) {
                document.getElementById('progressFill').style.width = `${((i+1)/files.length)*100}%`;
                let result;
                if (currentCategory === 'images') result = await convertImage(files[i], target, quality, width, height);
                else if (currentCategory === 'video') result = await convertVideo(files[i], target);
                else if (currentCategory === 'documents') result = await convertDocument(files[i], target);
                else if (currentCategory === 'archives') result = await convertArchive(files[i], target);
                else result = files[i];
                if (result) {
                    processedFiles.push(result);
                    saveToHistory(files[i], result, currentCategory, { target, quality, width, height });
                }
            }
            if (processedFiles.length > 0) { showPreview(processedFiles[0]); document.getElementById('downloadAllBtn').disabled = false; showToast(`Готово: ${processedFiles.length} файлов`, 'success'); }
            document.getElementById('progressBar').style.display = 'none';
            isProcessing = false;
        }

        async function convertImage(file, target, quality, w, h) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let tw = w ? parseInt(w) : img.width;
                        let th = h ? parseInt(h) : img.height;
                        if (w && !h) th = (img.height / img.width) * tw;
                        if (h && !w) tw = (img.width / img.height) * th;
                        canvas.width = tw; canvas.height = th;
                        canvas.getContext('2d').drawImage(img, 0, 0, tw, th);
                        const mime = mimeTypes[target] || 'image/jpeg';
                        const q = (target === 'jpg' || target === 'jpeg' || target === 'webp') ? quality : 1;
                        canvas.toBlob(blob => resolve(new File([blob], file.name.replace(/\.[^/.]+$/, '') + '.' + target, { type: mime })), mime, q);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        async function convertVideo(file, target) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const video = document.createElement('video');
                    video.onloadedmetadata = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        canvas.toBlob(blob => {
                            resolve(new File([blob], file.name.replace(/\.[^/.]+$/, '') + '.' + target, { type: mimeTypes[target] || 'video/mp4' }));
                        }, 'video/mp4');
                    };
                    video.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        async function convertDocument(file, target) {
            const ext = file.name.split('.').pop().toLowerCase();
            if (ext === 'txt' && target === 'pdf') {
                const { PDFDocument, rgb } = PDFLib;
                const pdfDoc = await PDFDocument.create();
                const text = await file.text();
                const page = pdfDoc.addPage([600, 800]);
                page.drawText(text.substring(0, 2000), { x: 50, y: 750, size: 12, color: rgb(0,0,0) });
                const pdfBytes = await pdfDoc.save();
                return new File([pdfBytes], file.name.replace('.txt','.pdf'), { type: 'application/pdf' });
            }
            if (ext === 'pdf' && target === 'txt') {
                const text = await extractPDFText(file);
                return new File([text], file.name.replace('.pdf','.txt'), { type: 'text/plain' });
            }
            if ((ext === 'docx' || ext === 'doc') && target === 'txt') {
                const arrayBuffer = await file.arrayBuffer();
                const result = await mammoth.extractRawText({ arrayBuffer });
                return new File([result.value], file.name.replace(/\.[^/.]+$/, '') + '.txt', { type: 'text/plain' });
            }
            if ((ext === 'xlsx' || ext === 'xls') && target === 'csv') {
                const data = await file.arrayBuffer();
                const workbook = XLSX.read(data);
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const csv = XLSX.utils.sheet_to_csv(sheet);
                return new File([csv], file.name.replace(/\.[^/.]+$/, '') + '.csv', { type: 'text/csv' });
            }
            return file;
        }

        async function extractPDFText(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const typedarray = new Uint8Array(e.target.result);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    let text = '';
                    for (let i = 1; i <= Math.min(pdf.numPages, 5); i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        text += content.items.map(item => item.str).join(' ') + '\n';
                    }
                    resolve(text.substring(0, 5000));
                };
                reader.readAsArrayBuffer(file);
            });
        }

        async function convertArchive(file, target) {
            if (target === 'zip' && file.name.split('.').pop().toLowerCase() !== 'zip') {
                const zip = new JSZip();
                const content = await file.text();
                zip.file(file.name.replace(/\.[^/.]+$/, '') + '.txt', content);
                const zipBlob = await zip.generateAsync({ type: 'blob' });
                return new File([zipBlob], file.name.replace(/\.[^/.]+$/, '') + '.zip', { type: 'application/zip' });
            }
            return file;
        }

        function saveToHistory(original, converted, category, settings) {
            const item = {
                id: Date.now() + Math.random().toString(36).substr(2,6),
                timestamp: new Date().toISOString(),
                category,
                original: { name: original.name, size: original.size, format: original.name.split('.').pop() },
                converted: { name: converted.name, size: converted.size, format: converted.name.split('.').pop() },
                compressionRatio: ((1 - converted.size / original.size) * 100).toFixed(1)
            };
            conversionHistory.unshift(item);
            if (conversionHistory.length > 100) conversionHistory = conversionHistory.slice(0,100);
            localStorage.setItem('conversionHistory', JSON.stringify(conversionHistory));
            updateHistoryList();
        }

        function updateHistoryList() {
            const list = document.getElementById('historyList');
            const filter = document.getElementById('historyCategoryFilter').value;
            const search = document.getElementById('historySearch').value.toLowerCase();
            let filtered = conversionHistory.filter(i => (filter === 'all' || i.category === filter) && (!search || i.original.name.toLowerCase().includes(search)));
            if (filtered.length === 0) { list.innerHTML = '<div class="history-empty"><i class="fas fa-history"></i><h3>История пуста</h3></div>'; return; }
            list.innerHTML = '';
            filtered.forEach(item => {
                list.innerHTML += `
                    <div class="history-item">
                        <div class="history-item-header"><div class="history-item-date">${new Date(item.timestamp).toLocaleString()}</div><div class="history-item-category">${getCategoryName(item.category)}</div></div>
                        <div class="history-item-files">
                            <div class="history-file"><i class="fas ${getIcon(item.original.name)} history-file-icon"></i><div><div>${item.original.name}</div><div>${(item.original.size/1024).toFixed(2)} KB</div></div></div>
                            <div class="history-file"><i class="fas ${getIcon(item.converted.name)} history-file-icon"></i><div><div>${item.converted.name}</div><div>${(item.converted.size/1024).toFixed(2)} KB${item.compressionRatio>0?` (${item.compressionRatio}%)`:''}</div></div></div>
                        </div>
                        <div class="history-item-footer">
                            <button onclick="loadFromHistory('${item.id}')"><i class="fas fa-rotate-left"></i> Загрузить</button>
                            <button onclick="downloadHistoryItem('${item.id}')"><i class="fas fa-download"></i> Скачать</button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('historyStats').textContent = `${filtered.length} записей`;
        }

        function getCategoryName(cat) {
            const names = { 'images':'Изображение','documents':'Документ','video':'Видео','archives':'Архив' };
            return names[cat] || cat;
        }

        window.loadFromHistory = (id) => {
            const item = conversionHistory.find(i => i.id === id);
            if (!item) return;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector('[data-tab="converter"]').classList.add('active');
            document.getElementById('converterTab').classList.add('active');
            document.querySelectorAll('.category-card').forEach(c => { c.classList.remove('active'); if(c.dataset.category === item.category) c.classList.add('active'); });
            currentCategory = item.category;
            updateFormatSelectors();
            const content = `Демо-файл: ${item.original.name}\nРазмер: ${(item.original.size/1024).toFixed(2)} KB`;
            const blob = new Blob([content], { type: 'text/plain' });
            files = [new File([blob], item.original.name, { type: 'text/plain' })];
            updateFileList();
            document.getElementById('convertBtn').disabled = false;
            showToast(`Загружен: ${item.original.name}`, 'success');
        };

        window.downloadHistoryItem = (id) => {
            const item = conversionHistory.find(i => i.id === id);
            if (!item) return;
            const content = `История: ${item.converted.name}\nИсходный: ${item.original.name}\nСжатие: ${item.compressionRatio}%`;
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = item.converted.name;
            a.click();
            URL.revokeObjectURL(url);
            showToast(`Скачано: ${item.converted.name}`, 'success');
        };

        function clearHistory() {
            if (confirm('Очистить историю?')) { conversionHistory = []; localStorage.removeItem('conversionHistory'); updateHistoryList(); showToast('История очищена', 'success'); }
        }

        function exportHistory() {
            const blob = new Blob([JSON.stringify(conversionHistory, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `history_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('История экспортирована', 'success');
        }

        function showPreview(file) {
            const area = document.getElementById('previewArea');
            const orig = document.getElementById('originalPreview');
            const res = document.getElementById('resultPreview');
            const origInfo = document.getElementById('originalInfo');
            const resInfo = document.getElementById('resultInfo');
            area.style.display = 'grid';
            if (files[0]?.type.startsWith('image/')) {
                orig.innerHTML = `<img src="${URL.createObjectURL(files[0])}">`;
                origInfo.innerHTML = `${files[0].name}<br>${(files[0].size/1024).toFixed(2)} KB`;
            } else {
                orig.innerHTML = '<i class="fas fa-file fa-3x"></i>';
                origInfo.innerHTML = files[0]?.name || '';
            }
            if (file.type.startsWith('image/')) {
                res.innerHTML = `<img src="${URL.createObjectURL(file)}">`;
                resInfo.innerHTML = `${file.name}<br>${(file.size/1024).toFixed(2)} KB<br>Сжатие: ${((1-file.size/files[0]?.size)*100).toFixed(1)}%`;
            } else if (file.type.startsWith('video/')) {
                res.innerHTML = `<video controls src="${URL.createObjectURL(file)}"></video>`;
                resInfo.innerHTML = `${file.name}<br>${(file.size/1024).toFixed(2)} KB`;
            } else {
                res.innerHTML = '<i class="fas fa-file fa-3x"></i>';
                resInfo.innerHTML = `${file.name}<br>${(file.size/1024).toFixed(2)} KB`;
            }
        }

        function downloadAll() {
            processedFiles.forEach(f => { const a = document.createElement('a'); a.href = URL.createObjectURL(f); a.download = f.name; a.click(); URL.revokeObjectURL(a.href); });
            showToast(`Скачано ${processedFiles.length} файлов`, 'success');
        }

        function showToast(msg, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':type==='error'?'fa-exclamation-circle':'fa-info-circle'}"></i> ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
    </script>
